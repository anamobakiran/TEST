<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeRead • Elite Book Library</title>
    <link rel="icon" href="https://i.postimg.cc/tRYvShSW-/Elite-Books-Library.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #f59e0b;
            --accent2: #ec4899;
            --text: #1e2937;
            --text-light: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }
        
        body.dark-mode {
            --primary: #0f172a;
            --accent: #fbbf24;
            --accent2: #f472b6;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --bg: #020617;
            --card-bg: #1e2937;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%);
            color: white;
            padding: 2.5rem 1.5rem 4rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2);
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: subtleRotate 60s linear infinite;
            opacity: 0.6;
        }

        @keyframes subtleRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo {
            max-width: 140px;
            height: auto;
            display: block;
            margin: 0 auto 1rem;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo:hover {
            transform: scale(1.08) rotate(8deg);
        }

        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.6rem;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.1);
        }

        .controls-container {
            max-width: 680px;
            margin: 2rem auto 0;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-container, .category-container {
            position: relative;
            flex: 1;
            min-width: 260px;
        }

        #searchInput, #categorySelect {
            width: 100%;
            padding: 1.1rem 1.25rem 1.1rem 3.25rem;
            font-size: 1.05rem;
            font-weight: 500;
            border: none;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.95);
            color: #1e2937;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 
                        0 4px 6px -4px rgb(0 0 0 / 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode #searchInput, body.dark-mode #categorySelect {
            background: #334155;
            color: #e2e8f0;
        }

        #searchInput:focus, #categorySelect:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.4),
                        0 20px 25px -5px rgb(0 0 0 / 0.2);
            transform: translateY(-2px);
        }

        .search-icon, .category-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.35rem;
            pointer-events: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            max-width: 1600px;
            margin: 0 auto;
            padding: 4rem 1.5rem 6rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1),
                        0 4px 6px -4px rgb(0 0 0 / 0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(245, 158, 11, 0.08));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
            border-radius: 24px;
        }

        .card:hover {
            transform: translateY(-18px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover img {
            transform: scale(1.12);
        }

        .card-content {
            padding: 1.75rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
            z-index: 2;
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 0.25rem;
            color: var(--text);
        }

        .author {
            font-style: italic;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .rating-container {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 1.35rem;
        }

        .stars {
            color: #fbbf24;
            letter-spacing: 2px;
        }

        .rating {
            font-weight: 600;
            color: var(--text-light);
            font-size: 1rem;
        }

        .formats {
            font-size: 0.9rem;
            color: var(--text-light);
            background: rgba(245, 158, 11, 0.1);
            padding: 4px 12px;
            border-radius: 9999px;
            display: inline-block;
            align-self: flex-start;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-light);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: 0.25rem;
        }

        .download-btn {
            margin-top: auto;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgb(245 158 11 / 0.3);
        }

        .download-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 20px 25px -5px rgb(245 158 11 / 0.4);
        }

        .downloads {
            font-size: 0.875rem;
            color: var(--text-light);
            text-align: center;
            margin-top: 0.75rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 2rem 0 4rem;
            padding: 0 1rem;
        }

        .pagination button {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: var(--card-bg);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .pagination button:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.1);
        }

        .pagination button.active {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            color: white;
            transform: scale(1.15);
        }

        footer {
            background: linear-gradient(to top, var(--primary), #1e40af);
            color: white;
            text-align: center;
            padding: 3.5rem 1.5rem 2rem;
            position: relative;
        }

        footer .copyright {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            letter-spacing: 1px;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 58px;
            height: 58px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .back-to-top.show {
            display: flex;
        }

        .back-to-top:hover {
            transform: scale(1.15) rotate(360deg);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.6s backwards;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 2rem;
                padding: 3rem 1rem;
            }
            
            .controls-container {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="https://weread.site" class="logo-link">
            <img src="https://i.postimg.cc/tRYvShSW-/Elite-Books-Library.png" alt="WeRead Logo" class="logo">
        </a>
        <button class="theme-toggle" onclick="toggleDarkMode()">🌙</button>
        
        <div class="controls-container">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search by title, author...">
                <span class="search-icon">🔍</span>
            </div>
            <div class="category-container">
                <select id="categorySelect" onchange="filterBooks(this.value)">
                    <option value="all">All Categories</option>
                    <option value="Self-Help">Self-Help</option>
                    <option value="Fiction">Fiction</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Romance">Romance</option>
                    <option value="Science Fiction">Science Fiction</option>
                    <option value="Historical Fiction">Historical Fiction</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Science">Science</option>
                    <option value="Philosophy">Philosophy</option>
                    <option value="Biography">Biography</option>
                    <!-- Add more as needed -->
                </select>
                <span class="category-icon">📚</span>
            </div>
        </div>
    </header>

    <div class="grid" id="bookGrid"></div>
    <div class="pagination" id="pagination"></div>

    <footer>
        <p class="copyright">© 2023–2026 WeRead.site • Curated with Passion</p>
    </footer>

    <button class="back-to-top" onclick="scrollToTop()">↑</button>

    <script>
        let books = [];
        const booksPerPage = 12; // Increased for better flow
        let currentPage = 1;
        let currentCategory = 'all';
        let filteredBooks = [];

        fetch('books.json')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load books');
                return response.json();
            })
            .then(data => {
                books = data.map(book => ({
                    ...book,
                    downloads: Math.floor(Math.random() * (45000 - 12000 + 1)) + 12000
                }));
                filteredBooks = [...books];
                renderBooks();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('bookGrid').innerHTML = `
                    <p style="text-align:center; grid-column:1/-1; padding:3rem; font-size:1.2rem;">
                        Sorry, could not load the library. Please refresh.
                    </p>`;
            });

        function renderBooks(page = 1) {
            currentPage = page;
            const bookGrid = document.getElementById('bookGrid');
            bookGrid.innerHTML = '';

            const start = (page - 1) * booksPerPage;
            const end = start + booksPerPage;
            const booksToShow = filteredBooks.slice(start, end);

            booksToShow.forEach((book, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${i * 0.06}s`;
                
                const fullStars = Math.floor(book.rating);
                let starsHTML = '★'.repeat(fullStars);
                if (book.rating % 1 >= 0.5) starsHTML += '★';
                
                card.innerHTML = `
                    <img src="${book.cover}" alt="${book.title}">
                    <div class="card-content">
                        <h2>${book.title}</h2>
                        <p class="author">by ${book.author}</p>
                        
                        <div class="rating-container">
                            <span class="stars">${starsHTML}</span>
                            <span class="rating">${book.rating}</span>
                        </div>
                        
                        <div class="formats">${book.formats.join(' • ')}</div>
                        <p class="description">${book.description}</p>
                        
                        <a href="${book.downloadLink}" target="_blank" style="text-decoration:none;">
                            <button class="download-btn">Download Now</button>
                        </a>
                        
                        <p class="downloads">📥 ${book.downloads.toLocaleString()} downloads</p>
                    </div>
                `;
                bookGrid.appendChild(card);
            });

            renderPagination();
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            const totalPages = Math.ceil(filteredBooks.length / booksPerPage);

            // Prev
            const prev = document.createElement('button');
            prev.textContent = '←';
            prev.disabled = currentPage === 1;
            prev.onclick = () => currentPage > 1 && renderBooks(currentPage - 1);
            pagination.appendChild(prev);

            for (let i = 1; i <= totalPages; i++) {
                if (totalPages > 7 && i !== 1 && i !== totalPages && Math.abs(i - currentPage) > 2) {
                    if (i === 2 || i === totalPages - 1) {
                        const ellipsis = document.createElement('span');
                        ellipsis.textContent = '...';
                        ellipsis.style.padding = '0 8px';
                        pagination.appendChild(ellipsis);
                    }
                    continue;
                }
                
                const btn = document.createElement('button');
                btn.textContent = i;
                if (i === currentPage) btn.classList.add('active');
                btn.onclick = () => renderBooks(i);
                pagination.appendChild(btn);
            }

            // Next
            const next = document.createElement('button');
            next.textContent = '→';
            next.disabled = currentPage === totalPages;
            next.onclick = () => currentPage < totalPages && renderBooks(currentPage + 1);
            pagination.appendChild(next);
        }

        function filterBooks(category) {
            currentCategory = category;
            currentPage = 1;
            
            if (category === 'all') {
                filteredBooks = [...books];
            } else {
                filteredBooks = books.filter(b => b.category === category);
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            if (searchTerm) {
                filteredBooks = filteredBooks.filter(book => 
                    book.title.toLowerCase().includes(searchTerm) ||
                    book.author.toLowerCase().includes(searchTerm) ||
                    book.description.toLowerCase().includes(searchTerm)
                );
            }
            
            renderBooks(1);
        }

        function searchBooks() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            currentPage = 1;
            
            filteredBooks = books.filter(book => 
                (currentCategory === 'all' || book.category === currentCategory) &&
                (book.title.toLowerCase().includes(term) ||
                 book.author.toLowerCase().includes(term) ||
                 book.description.toLowerCase().includes(term))
            );
            
            renderBooks(1);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const toggle = document.querySelector('.theme-toggle');
            toggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', searchBooks);

        window.addEventListener('scroll', () => {
            const btn = document.querySelector('.back-to-top');
            btn.classList.toggle('show', window.scrollY > 600);
        });

        // Initial load
        window.onload = () => {
            // Make sure category options are complete if needed
        };
    </script>
</body>
</html>
